document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

;\n    --price-font:'Geologica',system-ui,sans-serif;\n    --price-weight:700;\n  }\n  ::placeholder{color:var(--faint)}\n  input,select,button{font-family:var(--font-body)}\n  select{appearance:none;-webkit-appearance:none}\n<\u002Fstyle>\n<script src=\"55f57d25-ea1e-4696-b840-cffbb083ccb5\"><\u002Fscript>\n<\u002Fhelmet>\n\n\n<div style=\"min-height:100vh;background:var(--bg);color:var(--ink);font-family:var(--font-body);-webkit-font-smoothing:antialiased;padding-bottom:64px\">\n\n  <header style=\"position:sticky;top:0;z-index:50;background:var(--bg);border-bottom:1px solid var(--line)\">\n    <div style=\"max-width:1340px;margin:0 auto;padding:0 36px;height:66px;display:flex;align-items:center;justify-content:space-between;gap:24px\">\n      <div style=\"display:flex;align-items:center;gap:18px\">\n        <img src=\"8b8964cc-39e1-4e8c-a9c9-1e81b05214c2\" alt=\"Tranio\" style=\"height:28px;width:auto;display:block\">\n        <span style=\"width:1px;height:24px;background:var(--line-strong)\"><\u002Fspan>\n        <span style=\"font-size:13px;letter-spacing:.05em;color:var(--muted)\">Дубай<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:12px\">\n        <div style=\"display:flex;align-items:center;gap:8px\">\n          <span style=\"font-size:10.5px;text-transform:uppercase;letter-spacing:.12em;color:var(--faint)\">Валюта<\u002Fspan>\n          <div style=\"display:flex;border:1px solid var(--chip-border);border-radius:var(--radius);overflow:hidden;background:var(--chip-bg)\">\n            <button type=\"button\" onclick=\"{{ curAed }}\" style=\"padding:7px 15px;font-size:12px;font-weight:700;letter-spacing:.05em;border:none;cursor:pointer;background:{{ ui.curAedBg }};color:{{ ui.curAedInk }}\">AED<\u002Fbutton>\n            <button type=\"button\" onclick=\"{{ curUsd }}\" style=\"padding:7px 15px;font-size:12px;font-weight:700;letter-spacing:.05em;border:none;cursor:pointer;background:{{ ui.curUsdBg }};color:{{ ui.curUsdInk }}\">USD<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <div style=\"max-width:1340px;margin:0 auto;padding:0 36px\">\n\n    <section style=\"padding:46px 0 30px\">\n      <div style=\"display:flex;align-items:center;justify-content:space-between;gap:24px;margin-bottom:16px\">\n        <div style=\"font-size:11px;text-transform:uppercase;letter-spacing:.20em;color:var(--accent-ink);font-weight:700\">БЛИЖНИЙ ВОСТОК<\u002Fdiv>\n        <div style=\"font-size:12.5px;color:var(--faint);letter-spacing:.04em;white-space:nowrap\">Обновлено · июнь 2026<\u002Fdiv>\n      <\u002Fdiv>\n      <h1 style=\"font-family:var(--font-head);font-weight:600;font-size:44px;line-height:1.05;letter-spacing:-0.02em;margin:0;color:var(--ink);white-space:nowrap\">Собственный сток Tranio в Дубае<\u002Fh1>\n      <p style=\"margin:18px 0 0;font-size:15.5px;line-height:1.55;color:var(--muted);max-width:560px\">68 юнитов в 5 проектах Дубая<\u002Fp>\n    <\u002Fsection>\n\n    <section style=\"margin-bottom:22px;padding-top:8px\">\n      <div style=\"display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:20px\">\n        <div style=\"position:relative;flex:1;min-width:280px\">\n          <span style=\"position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--faint);font-size:15px\">⌕<\u002Fspan>\n          <input type=\"text\" value=\"{{ query }}\" onchange=\"{{ onQuery }}\" placeholder=\"Поиск по № юнита, проекту, виду…\" style=\"width:100%;padding:13px 16px 13px 40px;font-size:14px;color:var(--ink);background:var(--surface-2);border:1px solid var(--chip-border);border-radius:var(--radius);outline:none\">\n        <\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:8px\">\n          <span style=\"font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--faint)\">Сортировка<\u002Fspan>\n          <div style=\"position:relative\">\n            <select value=\"{{ sortValue }}\" onchange=\"{{ onSort }}\" style=\"padding:12px 38px 12px 15px;font-size:13.5px;font-weight:600;color:var(--ink);background:var(--surface-2);border:1px solid var(--chip-border);border-radius:var(--radius);outline:none;cursor:pointer\">\n              <option value=\"project-asc\">Проект (А→Я)<\u002Foption>\n              <option value=\"price-desc\">Цена · по убыванию<\u002Foption>\n              <option value=\"price-asc\">Цена · по возрастанию<\u002Foption>\n              <option value=\"area-desc\">Площадь · больше→меньше<\u002Foption>\n              <option value=\"area-asc\">Площадь · меньше→больше<\u002Foption>\n              <option value=\"unit-asc\">Юнит №<\u002Foption>\n            <\u002Fselect>\n            <span style=\"position:absolute;right:14px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--muted);font-size:11px\">▼<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:flex;gap:32px;flex-wrap:wrap;align-items:flex-start\">\n        <div>\n          <div style=\"font-size:10.5px;text-transform:uppercase;letter-spacing:.12em;color:var(--faint);margin-bottom:10px\">Проект<\u002Fdiv>\n          <div style=\"display:flex;gap:8px;flex-wrap:wrap\">\n            <sc-for list=\"{{ projectChips }}\" as=\"c\" hint-placeholder-count=\"5\">\n              <button type=\"button\" onclick=\"{{ c.onClick }}\" style=\"display:inline-flex;align-items:center;padding:8px 14px;font-size:13px;font-weight:600;border:1px solid {{ c.border }};border-radius:999px;cursor:pointer;background:{{ c.bg }};color:{{ c.ink }}\">{{ c.label }}<span style=\"opacity:.5;font-size:11px;margin-left:8px;font-weight:500\">{{ c.count }}<\u002Fspan><\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-size:10.5px;text-transform:uppercase;letter-spacing:.12em;color:var(--faint);margin-bottom:10px\">Тип<\u002Fdiv>\n          <div style=\"display:flex;gap:8px;flex-wrap:wrap\">\n            <sc-for list=\"{{ typeChips }}\" as=\"c\" hint-placeholder-count=\"4\">\n              <button type=\"button\" onclick=\"{{ c.onClick }}\" style=\"display:inline-flex;align-items:center;padding:8px 14px;font-size:13px;font-weight:600;border:1px solid {{ c.border }};border-radius:999px;cursor:pointer;background:{{ c.bg }};color:{{ c.ink }}\">{{ c.label }}<span style=\"opacity:.5;font-size:11px;margin-left:8px;font-weight:500\">{{ c.count }}<\u002Fspan><\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-size:10.5px;text-transform:uppercase;letter-spacing:.12em;color:var(--faint);margin-bottom:10px\">Статус<\u002Fdiv>\n          <div style=\"display:flex;gap:8px;flex-wrap:wrap\">\n            <sc-for list=\"{{ statusChips }}\" as=\"c\" hint-placeholder-count=\"3\">\n              <button type=\"button\" onclick=\"{{ c.onClick }}\" style=\"display:inline-flex;align-items:center;padding:8px 14px;font-size:13px;font-weight:600;border:1px solid {{ c.border }};border-radius:999px;cursor:pointer;background:{{ c.bg }};color:{{ c.ink }}\">{{ c.label }}<span style=\"opacity:.5;font-size:11px;margin-left:8px;font-weight:500\">{{ c.count }}<\u002Fspan><\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"align-self:flex-end;padding-bottom:2px\">\n          <button type=\"button\" onclick=\"{{ reset }}\" style=\"padding:8px 4px;font-size:12.5px;font-weight:600;letter-spacing:.02em;border:none;background:none;cursor:pointer;color:var(--accent-ink);text-decoration:underline;text-underline-offset:3px\">Сбросить фильтры<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <section style=\"border:1px solid var(--line);border-radius:var(--radius);background:var(--surface);overflow:hidden\">\n      <div style=\"overflow-x:auto\">\n        <div style=\"min-width:1392px\">\n          <div style=\"display:grid;grid-template-columns:var(--cols);gap:16px;align-items:center;padding:15px 22px;background:var(--head-bg);border-bottom:1px solid var(--line-strong)\">\n            <div onclick=\"{{ sort.project }}\" style=\"font-size:10.5px;text-transform:uppercase;letter-spacing:.09em;font-weight:700;color:var(--head-ink);cursor:pointer\">Проект{{ carets.project }}<\u002Fdiv>\n            <div onclick=\"{{ sort.unit }}\" style=\"font-size:10.5px;text-transform:uppercase;letter-spacing:.09em;font-weight:700;color:var(--head-ink);cursor:pointer\">Юнит{{ carets.unit }}<\u002Fdiv>\n            <div onclick=\"{{ sort.type }}\" style=\"font-size:10.5px;text-transform:uppercase;letter-spacing:.09em;font-weight:700;color:var(--head-ink);cursor:pointer\">Тип{{ carets.type }}<\u002Fdiv>\n            <div onclick=\"{{ sort.floor }}\" style=\"font-size:10.5px;text-transform:uppercase;letter-spacing:.09em;font-weight:700;color:var(--head-ink);cursor:pointer\">Этаж{{ carets.floor }}<\u002Fdiv>\n            <div onclick=\"{{ sort.area }}\" style=\"font-size:10.5px;text-transform:uppercase;letter-spacing:.09em;font-weight:700;color:var(--head-ink);cursor:pointer\">Площадь{{ carets.area }}<\u002Fdiv>\n            <div style=\"font-size:10.5px;text-transform:uppercase;letter-spacing:.09em;font-weight:700;color:var(--head-ink)\">Вид<\u002Fdiv>\n            <div onclick=\"{{ sort.price }}\" style=\"font-size:10.5px;text-transform:uppercase;letter-spacing:.09em;font-weight:700;color:var(--head-ink);cursor:pointer;text-align:right\">Цена{{ carets.price }}<\u002Fdiv>\n            <div style=\"font-size:10.5px;text-transform:uppercase;letter-spacing:.09em;font-weight:700;color:var(--head-ink)\">Комиссия<\u002Fdiv>\n            <div style=\"font-size:10.5px;text-transform:uppercase;letter-spacing:.09em;font-weight:700;color:var(--head-ink)\">Эксклюзив<\u002Fdiv>\n            <div style=\"font-size:10.5px;text-transform:uppercase;letter-spacing:.09em;font-weight:700;color:var(--head-ink)\">Статус<\u002Fdiv>\n          <\u002Fdiv>\n\n          <sc-for list=\"{{ rows }}\" as=\"row\" hint-placeholder-count=\"12\">\n            <div style=\"display:grid;grid-template-columns:var(--cols);gap:16px;align-items:center;padding:var(--row-py) 22px;border-bottom:1px solid var(--line);background:{{ row.rowBg }}\" style-hover=\"background:var(--row-hover)\">\n              <div style=\"min-width:0\">\n                <div style=\"font-size:14px;font-weight:600;color:var(--ink);line-height:1.25;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ row.project }}<\u002Fdiv>\n                <div style=\"font-size:11.5px;color:var(--muted);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ row.meta }}<\u002Fdiv>\n                <sc-if value=\"{{ row.resale }}\" hint-placeholder-val=\"{{ false }}\">\n                  <span style=\"display:inline-block;margin-top:6px;padding:2px 8px;font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--accent-ink);background:var(--accent-soft);border-radius:4px\">{{ row.resaleLabel }}<\u002Fspan>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n              <div style=\"font-size:14px;font-weight:600;color:var(--ink);font-variant-numeric:tabular-nums\">{{ row.unit }}<\u002Fdiv>\n              <div style=\"font-size:13px;color:var(--ink)\">{{ row.type }}<\u002Fdiv>\n              <div style=\"font-size:13.5px;color:var(--ink);font-variant-numeric:tabular-nums\">{{ row.floor }}<\u002Fdiv>\n              <div>\n                <div style=\"font-size:13.5px;color:var(--ink);font-variant-numeric:tabular-nums\">{{ row.areaMain }}<\u002Fdiv>\n                <div style=\"font-size:11.5px;color:var(--faint);margin-top:2px;font-variant-numeric:tabular-nums\">{{ row.areaSub }}<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"font-size:12.5px;color:var(--muted);line-height:1.35;min-width:0\">{{ row.view }}<\u002Fdiv>\n              <div style=\"text-align:right\">\n                <div style=\"font-family:var(--price-font);font-size:16px;font-weight:var(--price-weight);color:var(--ink);font-variant-numeric:tabular-nums;line-height:1.1\">{{ row.priceMain }}<\u002Fdiv>\n                <div style=\"font-size:12px;color:var(--muted);margin-top:3px;font-variant-numeric:tabular-nums\">{{ row.priceAlt }}<\u002Fdiv>\n                <div style=\"font-size:11px;color:var(--faint);margin-top:2px;font-variant-numeric:tabular-nums\">{{ row.perSqft }}<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"font-size:12.5px;font-weight:600;color:var(--accent-ink);font-variant-numeric:tabular-nums\">{{ row.commission }}<\u002Fdiv>\n              <div style=\"font-size:12.5px;color:var(--ink)\">{{ row.exclusive }}<\u002Fdiv>\n              <div>\n                <span style=\"display:inline-flex;align-items:center;gap:7px;padding:5px 11px;font-size:11.5px;font-weight:600;border-radius:999px;background:{{ row.stBg }};color:{{ row.stInk }}\"><span style=\"width:6px;height:6px;border-radius:50%;background:{{ row.stDot }}\"><\u002Fspan>{{ row.status }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n\n          <sc-if value=\"{{ empty }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"padding:80px 22px;text-align:center;color:var(--muted)\">\n              <div style=\"font-family:var(--font-head);font-size:22px;color:var(--ink);margin-bottom:8px\">Ничего не найдено<\u002Fdiv>\n              <div style=\"font-size:14px\">Попробуйте изменить фильтры или сбросить их.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <div style=\"margin-top:22px;font-size:11.5px;color:var(--faint);letter-spacing:.03em;line-height:1.6\">68&nbsp;юнитов · 5&nbsp;проектов · застройщики Aqua Properties и Imtiaz. Цены ориентировочные, USD&nbsp;конвертирован по фиксированному курсу. Внутренний реестр Tranio — данные для квалификации и подбора.<\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { units: [], currency:'aed', variant:'a', query:'', fProjects:[], fTypes:[], fStatus:'all', sortKey:'project', sortDir:'asc' };\n\n  componentDidMount(){\n    this.applyVariant();\n    this.loadData();\n  }\n  loadData(){\n    const apply = (d) => { if (Array.isArray(d) && d.length) this.setState({ units: d }); };\n    if (Array.isArray(window.TRANIO_STOCK) && window.TRANIO_STOCK.length){ apply(window.TRANIO_STOCK); return; }\n    fetch('data/units.json')\n      .then(r => r.json())\n      .then(apply)\n      .catch(()=>{ setTimeout(()=>this.loadData(), 120); });\n  }\n  applyVariant(){ try { document.body.dataset.variant = this.state.variant; } catch(e){} }\n\n  fmt(n){ return new Intl.NumberFormat('ru-RU',{maximumFractionDigits:0}).format(Math.round(n||0)); }\n  millions(n){ return (n/1e6).toLocaleString('ru-RU',{minimumFractionDigits:1,maximumFractionDigits:1}); }\n  money(n, cur){ return cur==='usd' ? ('$'+this.fmt(n)) : (this.fmt(n)+' AED'); }\n\n  toggleArr(key, val){\n    const a = this.state[key];\n    const next = a.includes(val) ? a.filter(x=>x!==val) : a.concat([val]);\n    this.setState({ [key]: next });\n  }\n  reset(){ this.setState({ query:'', fProjects:[], fTypes:[], fStatus:'all' }); }\n  setSort(key){ this.setState(s=>({ sortKey:key, sortDir: (s.sortKey===key && s.sortDir==='asc') ? 'desc' : 'asc' })); }\n\n  filtered(){\n    const { units, query, fProjects, fTypes, fStatus, sortKey, sortDir } = this.state;\n    const q = query.trim().toLowerCase();\n    let r = units.filter(u => {\n      if (fProjects.length && fProjects.indexOf(u.project) < 0) return false;\n      if (fTypes.length && fTypes.indexOf(u.type) < 0) return false;\n      if (fStatus !== 'all'){ const want = fStatus==='avail' ? 'Доступен' : 'Забронирована'; if (u.status !== want) return false; }\n      if (q){ const hay = (u.unit+' '+u.project+' '+u.view+' '+u.district+' '+u.type+' '+u.developer).toLowerCase(); if (hay.indexOf(q) < 0) return false; }\n      return true;\n    });\n    const dir = sortDir === 'asc' ? 1 : -1;\n    const byUnit = (a,b)=> (''+a.unit).localeCompare(''+b.unit,'ru',{numeric:true});\n    r.sort((a,b)=>{\n      switch(sortKey){\n        case 'unit': return byUnit(a,b)*dir;\n        case 'type': { const d=(a.beds-b.beds)*dir; return d!==0?d:byUnit(a,b); }\n        case 'floor': { const d=((parseInt(a.floor,10)||0)-(parseInt(b.floor,10)||0))*dir; return d!==0?d:byUnit(a,b); }\n        case 'area': { const d=((a.sqft||0)-(b.sqft||0))*dir; return d!==0?d:byUnit(a,b); }\n        case 'price': { const d=((a.aed||0)-(b.aed||0))*dir; return d!==0?d:byUnit(a,b); }\n        case 'project': default: { const c=a.project.localeCompare(b.project,'ru')*dir; return c!==0?c:byUnit(a,b); }\n      }\n    });\n    return r;\n  }\n\n  chip(active, label, count, onClick){\n    return {\n      label: label, count: count, onClick: onClick, active: active,\n      bg: active ? 'var(--chip-active-bg)' : 'var(--chip-bg)',\n      ink: active ? 'var(--chip-active-ink)' : 'var(--ink)',\n      border: active ? 'var(--chip-active-bg)' : 'var(--chip-border)'\n    };\n  }\n\n  renderVals(){\n    const cur = this.state.currency;\n    const all = this.state.units;\n    const r = this.filtered();\n\n    const rows = r.map((u, idx) => {\n      const mainVal = cur==='usd' ? u.usd : u.aed;\n      const altVal  = cur==='usd' ? u.aed : u.usd;\n      const perRaw  = cur==='usd' ? (u.usd / u.sqft) : u.aedSqft;\n      const st = u.status==='Доступен'\n        ? { bg:'#E9F1EA', ink:'#2F6B45', dot:'#5AA677' }\n        : { bg:'#F5EBDA', ink:'#97681C', dot:'#C8922F' };\n      return {\n        id:u.id, project:u.project, meta:(u.district+' · '+u.developer),\n        resale:u.resale, resaleLabel:'Вторичка',\n        unit:u.unit, type:u.type, floor:u.floor,\n        areaMain:this.fmt(u.sqft)+' фт²', areaSub:this.fmt(u.sqm)+' м²',\n        view:u.view || '—',\n        priceMain:this.money(mainVal, cur),\n        priceAlt:this.money(altVal, cur==='usd'?'aed':'usd'),\n        perSqft: cur==='usd' ? ('$'+this.fmt(perRaw)+' / фт²') : (this.fmt(perRaw)+' AED / фт²'),\n        installments:u.installments, commission:u.commission, exclusive:u.exclusive,\n        status:u.status, stBg:st.bg, stInk:st.ink, stDot:st.dot,\n        rowBg: idx % 2 === 1 ? 'var(--zebra)' : 'transparent'\n      };\n    });\n\n    const sumMain = r.reduce((s,u)=> s + (cur==='usd'?u.usd:u.aed), 0);\n    const perArr = r.map(u => cur==='usd' ? (u.usd/u.sqft) : u.aedSqft);\n    const avg = perArr.length ? perArr.reduce((a,b)=>a+b,0)/perArr.length : 0;\n    const prices = r.map(u => cur==='usd'?u.usd:u.aed);\n    const min = prices.length ? Math.min.apply(null,prices) : 0;\n    const max = prices.length ? Math.max.apply(null,prices) : 0;\n    const curSym = cur==='usd' ? '$' : '';\n    const curSuf = cur==='usd' ? '' : ' AED';\n    const stats = {\n      shown: r.length, total: all.length || 68,\n      projects: new Set(r.map(u=>u.project)).size,\n      sum: (cur==='usd'?'$':'') + this.millions(sumMain) + (cur==='usd'?' млн':' млн AED'),\n      avg: cur==='usd' ? ('$'+this.fmt(avg)+'/фт²') : (this.fmt(avg)+' AED/фт²'),\n      range: (cur==='usd'?'$':'') + this.millions(min) + '–' + this.millions(max) + (cur==='usd'?' млн':' млн')\n    };\n\n    const projects = ['The Community MC','The Central Downtown (Arjan)','The Community Sports Arena','Le Blanc','The Symphony'];\n    const types = ['Студия','1 спальня','2 спальни','3 спальни'];\n    const cnt = {};\n    all.forEach(u => { cnt[u.project] = (cnt[u.project]||0)+1; });\n    const cntT = {};\n    all.forEach(u => { cntT[u.type] = (cntT[u.type]||0)+1; });\n    const availN = all.filter(u=>u.status==='Доступен').length;\n    const bookedN = all.filter(u=>u.status==='Забронирована').length;\n\n    const projectChips = projects.map(p => this.chip(this.state.fProjects.indexOf(p)>=0, p, cnt[p]||0, ()=>this.toggleArr('fProjects', p)));\n    const typeChips = types.map(t => this.chip(this.state.fTypes.indexOf(t)>=0, t, cntT[t]||0, ()=>this.toggleArr('fTypes', t)));\n    const statusChips = [\n      this.chip(this.state.fStatus==='all', 'Все', all.length, ()=>this.setState({fStatus:'all'})),\n      this.chip(this.state.fStatus==='avail', 'Доступные', availN, ()=>this.setState({fStatus:'avail'})),\n      this.chip(this.state.fStatus==='booked', 'Забронированы', bookedN, ()=>this.setState({fStatus:'booked'}))\n    ];\n\n    const car = (k)=> this.state.sortKey===k ? (this.state.sortDir==='asc'?' ↑':' ↓') : '';\n    const carets = { project:car('project'), unit:car('unit'), type:car('type'), floor:car('floor'), area:car('area'), price:car('price') };\n    const sort = {\n      project:()=>this.setSort('project'), unit:()=>this.setSort('unit'), type:()=>this.setSort('type'),\n      floor:()=>this.setSort('floor'), area:()=>this.setSort('area'), price:()=>this.setSort('price')\n    };\n\n    const ui = {\n      curAedBg: cur==='aed'?'var(--accent)':'transparent', curAedInk: cur==='aed'?'#fff':'var(--muted)',\n      curUsdBg: cur==='usd'?'var(--accent)':'transparent', curUsdInk: cur==='usd'?'#fff':'var(--muted)',\n      varABg: this.state.variant==='a'?'var(--accent)':'transparent', varAInk: this.state.variant==='a'?'#fff':'var(--muted)',\n      varBBg: this.state.variant==='b'?'var(--accent)':'transparent', varBInk: this.state.variant==='b'?'#fff':'var(--muted)'\n    };\n\n    return {\n      cols: 'minmax(190px,1.3fr) 78px 104px 60px 108px minmax(140px,1fr) 172px 92px 96px 96px 124px',\n      rows: rows, empty: all.length>0 && r.length===0,\n      stats: stats,\n      projectChips: projectChips, typeChips: typeChips, statusChips: statusChips,\n      carets: carets, sort: sort, ui: ui,\n      query: this.state.query,\n      sortValue: this.state.sortKey + '-' + this.state.sortDir,\n      onQuery: (e)=> this.setState({ query: e.target.value }),\n      onSort: (e)=> { const p = e.target.value.split('-'); this.setState({ sortKey:p[0], sortDir:p[1] }); },\n      reset: ()=> this.reset(),\n      curAed: ()=> this.setState({currency:'aed'}), curUsd: ()=> this.setState({currency:'usd'}),\n      varA: ()=> this.setState({variant:'a'}, ()=>this.applyVariant()),\n      varB: ()=> this.setState({variant:'b'}, ()=>this.applyVariant())\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
